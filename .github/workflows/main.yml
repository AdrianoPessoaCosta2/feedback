name: "PROD DEPLOY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prd
      aws-assume-role-arn: "arn:aws:iam::170202974334:role/github-actions-proj-pipeline"
      aws-region: "us-east-2"
      aws-statefile-s3-bucket: "proj-us-east-2-terr-statefile"
      aws-lock-dynamodb-table: "proj-us-east-2-terr-lock"