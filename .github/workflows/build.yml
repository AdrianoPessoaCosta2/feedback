name: "Build & Test"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  api-quarkus:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-quarkus
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: maven

      - name: Build & Test
        run: mvn verify -B

  service-spring:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-spring
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: maven

      - name: Build & Test
        run: mvn verify -B

  lambda-email:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda-email
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: maven

      - name: Build
        run: mvn package -B

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (validation only)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
