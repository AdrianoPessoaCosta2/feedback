server:
  port: 8081

aws:
  region: ${AWS_REGION:us-east-2}
  sqs:
    queue-url: ${SQS_QUEUE_URL:}
    endpoint-override: ${SQS_ENDPOINT_OVERRIDE:}
  dynamodb:
    table-name: ${DYNAMODB_TABLE_NAME:feedback}
    endpoint-override: ${DYNAMODB_ENDPOINT_OVERRIDE:}

sqs:
  poll:
    interval: ${SQS_POLL_INTERVAL:5000}

report:
  cron: ${REPORT_CRON:0 0 8 * * MON}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
